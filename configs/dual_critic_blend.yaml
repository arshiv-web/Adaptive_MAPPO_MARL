defaults:
  - progressive_config
  - _self_

# PPO hyperparameters (same as MAPPO/IPPO baselines)
share_param_critic: True
clip_epsilon: 0.2
entropy_coef: 0.0
critic_coef: 1.0
loss_critic_type: "l2"
lmbda: 0.9
scale_mapping: "biased_softplus_1.0"
use_tanh_normal: False  # IndependentNormal avoids TorchRL TanhNormal instability (#2199)
minibatch_advantage: False

# Dual-critic blending parameters
# Default: fixed alpha=0.5 (balanced blend of local + centralized critics)
# Set alpha_start = alpha_end for fixed blending (recommended)
# Annealing schedules (linear, cosine, etc.) are provided for ablation only
alpha_start: 0.5
alpha_end: 0.5
anneal_schedule: "constant"
